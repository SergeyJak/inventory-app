<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Яндекс Станции</title>
  <link rel="stylesheet" href="catalog.css" />
</head>
<body>
  <main>
    <section class="showroom" id="showroom">
      <header class="site-header">
        <a href="catalog.html">Яндекс Станции</a>
        <a href="#" class="contact-link" id="top-contact">Связаться</a>
      </header>

      <div id="catalog-state" class="catalog-state">Загружаем модели...</div>

      <div class="hero" id="catalog-content" hidden>
        <div class="copy">
          <p class="eyebrow">Выбрана модель</p>
          <h1 id="model-title"></h1>
          <p class="line" id="model-line"></p>
          <div class="buy">
            <div class="price" id="model-price"></div>
            <a class="cta" href="#" id="contact-cta">Уточнить</a>
          </div>
        </div>

        <div class="hero-photo">
          <img id="hero-image" alt="" />
        </div>
      </div>

      <nav class="model-switcher" id="model-switcher" aria-label="Модели"></nav>
      <nav class="color-gallery" id="color-gallery" aria-label="Цвета"></nav>
    </section>

    <section class="model-details" id="model-details" hidden>
      <div class="details-head">
        <p class="eyebrow">О модели</p>
        <h2 id="details-title"></h2>
        <p id="details-summary"></p>
      </div>
      <div class="details-grid" id="details-grid" aria-label="Описание модели"></div>
    </section>
  </main>

  <script src="catalog.js"></script>
</body>
</html>
