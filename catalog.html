<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Яндекс Станции</title>
  <link rel="stylesheet" href="catalog.css" />
</head>
<body>
  <main>
    <section class="showroom" id="showroom">
      <header class="site-header">
        <a href="catalog.html">Яндекс Станции</a>
        <button class="contact-link" id="top-contact" type="button">Связаться</button>
      </header>

      <div id="catalog-state" class="catalog-state">Загружаем модели...</div>

      <div class="hero" id="catalog-content" hidden>
        <div class="copy">
          <p class="eyebrow">Выбрана модель</p>
          <h1 id="model-title"></h1>
          <p class="line" id="model-line"></p>
          <div class="buy">
            <div class="price" id="model-price"></div>
            <button class="cta" id="contact-cta" type="button">Связаться</button>
          </div>
        </div>

        <div class="hero-photo">
          <img id="hero-image" alt="" />
        </div>
      </div>

      <nav class="model-switcher" id="model-switcher" aria-label="Модели"></nav>
      <nav class="color-gallery" id="color-gallery" aria-label="Цвета"></nav>
    </section>

    <section class="model-details" id="model-details" hidden>
      <div class="details-head">
        <p class="eyebrow">О модели</p>
        <h2 id="details-title"></h2>
        <p id="details-summary"></p>
      </div>
      <div class="details-grid" id="details-grid" aria-label="Описание модели"></div>
    </section>
  </main>

  <div class="overlay" id="overlay" hidden></div>

  <aside class="contact-panel" id="contact-panel" aria-label="Связаться" aria-hidden="true">
    <button class="panel-close" id="contact-close" type="button" aria-label="Закрыть"></button>
    <p class="panel-kicker">Связаться</p>
    <h2>Удобным способом</h2>
    <div class="contact-actions" id="contact-actions"></div>
    <div class="question-actions" id="question-actions"></div>
  </aside>

  <button class="assistant-fab" id="assistant-fab" type="button">Алиса поможет выбрать</button>

  <aside class="assistant-panel" id="assistant-panel" aria-label="Помощник по выбору" aria-hidden="true">
    <button class="panel-close" id="assistant-close" type="button" aria-label="Закрыть"></button>
    <p class="panel-kicker">Помощник</p>
    <h2>Помогу подобрать Яндекс Станцию.</h2>
    <div class="assistant-options" id="assistant-options"></div>
    <div class="assistant-result" id="assistant-result" hidden></div>
  </aside>

  <script src="catalog.js"></script>
</body>
</html>
