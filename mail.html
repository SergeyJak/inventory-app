<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HeySmart Mail</title>
  <link rel="icon" href="/favicon.ico?v=2" sizes="any" />
  <link rel="stylesheet" href="/mail.css?v=20260628-polish1" />
</head>
<body data-mail-screen="checking">
  <main class="mail-shell">
    <section class="login-view" id="login-view" hidden>
      <a class="back-link" href="/catalog.html">HeySmart</a>
      <div class="login-card">
        <h1 data-mail-i18n="loginTitle">Вход в почту</h1>
        <form id="login-form">
          <label for="mail-email" data-mail-i18n="email">Email</label>
          <div class="email-login-row">
            <input id="mail-email" type="text" autocomplete="username" placeholder="username" required />
            <span>@heysmart.lv</span>
          </div>
          <label for="mail-password" data-mail-i18n="password">Password</label>
          <input id="mail-password" type="password" autocomplete="current-password" placeholder="Password" data-mail-placeholder="passwordPlaceholder" required />
          <button type="submit" id="login-btn" data-mail-i18n="login">Войти</button>
        </form>
        <div class="error" id="login-error"></div>
      </div>
    </section>

    <section class="inbox-view" id="inbox-view" hidden>
      <header class="mail-header">
        <div>
          <a class="catalog-link" href="/catalog.html" data-mail-i18n="catalog">← Каталог</a>
          <h1>HeySmart Mail</h1>
          <p id="mailbox-title"></p>
        </div>
        <div class="mail-status" id="mail-status"></div>
        <div class="mail-actions">
          <button type="button" id="refresh-btn" data-mail-i18n="refresh">Обновить</button>
          <button type="button" id="logout-btn" data-mail-i18n="logout">Выйти</button>
        </div>
      </header>

      <div class="mail-layout">
        <aside class="message-list" id="message-list"></aside>
        <article class="message-detail" id="message-detail">
          <div class="empty-state">
            <span>📭</span>
            <strong data-mail-i18n="emptyTitle">Писем пока нет.</strong>
            <p data-mail-i18n="emptyText">Если вы ожидаете код подтверждения, нажмите "Обновить" через несколько секунд.</p>
          </div>
        </article>
      </div>
    </section>
  </main>
  <div class="toast" id="toast"></div>
  <script src="/mail.js?v=20260626-i18n2"></script>
</body>
</html>
